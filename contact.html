<!DOCTYPE html>
<html>
<head>
    <title>Contact - Hospital Management System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f2f7fb;
        }

        header {
            background: #008080;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #333;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        .contact {
            background: white;
            margin: 30px;
            padding: 25px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: #008080;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #006666;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

    </style>

</head>

<body>

<header>
    <h1>Contact Us</h1>
    <p>Get in touch with our hospital</p>
</header>


<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
</nav>


<div class="contact">

    <h2>Send Us A Message</h2>

    <form>

        <label>Name:</label>
        <input type="text" placeholder="Enter your name">


        <label>Email:</label>
        <input type="email" placeholder="Enter your email">


        <label>Message:</label>
        <textarea rows="5" placeholder="Write your message"></textarea>


        <button type="submit">Send Message</button>

    </form>


    <h2>Hospital Information</h2>

    <p><b>Location:</b> Arusha, Tanzania</p>
    <p><b>Phone:</b> +255 662 461 777</p>
    <p><b>Email:</b> info@hospital.com</p>


</div>


<footer>
    <p>© 2026 Hospital Management System</p>
</footer>


</body>
</html>
